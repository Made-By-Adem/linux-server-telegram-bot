services:
  bot:
    build: .
    command: linux-bot
    env_file: .env
    environment:
      CONFIG_PATH: /app/config.yaml
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./logs/bot:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket
      - /opt/scripts:/opt/scripts:ro
      - /var/log:/var/log:ro
    restart: unless-stopped
    network_mode: host
    pid: host
    cap_add:
      - SYS_PTRACE
    healthcheck:
      test: ["CMD", "python", "-c", "import os, time; assert time.time() - os.path.getmtime('/tmp/bot_healthy') < 300"]
      interval: 60s
      timeout: 5s
      retries: 3

  monitoring:
    build: .
    command: linux-monitor
    env_file: .env
    environment:
      CONFIG_PATH: /app/config.yaml
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./logs/monitoring:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket
      - /var/log:/var/log:ro
    restart: unless-stopped
    pid: host
    cap_add:
      - SYS_PTRACE
    healthcheck:
      test: ["CMD", "python", "-c", "import os, time; assert time.time() - os.path.getmtime('/tmp/monitor_healthy') < 600"]
      interval: 60s
      timeout: 5s
      retries: 3

  api:
    build: .
    command: linux-api
    env_file: .env
    environment:
      CONFIG_PATH: /app/config.yaml
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./logs/api:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket
      - /opt/scripts:/opt/scripts:ro
      - /var/log:/var/log:ro
    restart: unless-stopped
    network_mode: host
    pid: host
    cap_add:
      - SYS_PTRACE
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8120/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
