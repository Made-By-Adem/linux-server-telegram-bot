services:
  bot:
    build: .
    command: linux-bot
    env_file: .env
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./logs/bot:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket
      - /opt/scripts:/opt/scripts:ro
      - /var/log:/var/log:ro
    restart: unless-stopped
    network_mode: host
    healthcheck:
      test: ["CMD", "python", "-c", "import os, time; assert time.time() - os.path.getmtime('/tmp/bot_healthy') < 300"]
      interval: 60s
      timeout: 5s
      retries: 3

  monitoring:
    build: .
    command: linux-monitor
    env_file: .env
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./logs/monitoring:/app/logs
      - ./server_states.json:/app/server_states.json
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket
      - /var/log:/var/log:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import os, time; assert time.time() - os.path.getmtime('/tmp/monitor_healthy') < 600"]
      interval: 60s
      timeout: 5s
      retries: 3
