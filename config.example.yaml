# Linux Server Bot - Configuration
# Environment variables can be referenced with ${VAR_NAME} syntax.
# Copy this file to config.yaml and adjust values.

telegram:
  bot_token: ${SECRET_TOKEN}
  allowed_users:
    - ${CHAT_ID_PERSON1}

wol:
  address: ${WOL_ADDRESS}
  hostname: ${WOL_HOSTNAME}
  interface: eth0

# Toggle features on/off. Disabled features hide their menu buttons.
features:
  systemd_services: true
  docker_containers: true
  docker_compose: true
  custom_commands: true
  wol: true
  security_overview: true
  backups: true
  container_updates: true
  logs: true
  server_ping: true
  system_info: true
  stress_test: true
  fan_control: true
  reboot: true

# HTTP API (for multi-server management / AI agent access)
api:
  enabled: true
  port: 8120
  api_key: ${API_KEY}

# Systemd services manageable via the bot
services:
  - docker
  - ufw
  - nginx

# Docker containers shown in bot menus (leave empty to auto-detect)
containers:
  - portainer
  - nginx

# Docker Compose stacks
compose_stacks:
  - name: "media-stack"
    path: /opt/stacks/media
  - name: "monitoring"
    path: /opt/stacks/monitoring

# Servers to ping
servers:
  - name: "My VPS"
    host: "1.2.3.4"
    port: 443

# Log file paths or directories.
# Directories are scanned for *.log files (rotated logs are excluded).
# Remove or comment out any paths that don't exist on your system.
logfiles:
  # -- Security & intrusion detection --
  - /var/log/auth.log              # SSH logins, sudo, PAM authentication
  - /var/log/fail2ban.log          # Fail2ban IP bans and jail activity
  - /var/log/ufw.log               # UFW firewall blocked/allowed traffic
  - /var/log/rkhunter.log           # Rkhunter main log
  - /var/log/rkhunter-scan-*.log   # Rkhunter scan reports (latest match)
  - /var/log/aide/                 # AIDE file integrity check reports (daily)

  # -- System --
  - /var/log/syslog                # General system log
  - /var/log/kern.log              # Kernel messages (hardware, drivers)
  - /var/log/dpkg.log              # Package installs and updates

  # -- Automatic updates --
  - /var/log/unattended-upgrades/  # Automatic security update logs

  # -- Docker & containers --
  - /var/log/docker-updates/       # Container update script logs

  # -- Web server (uncomment if applicable) --
  # - /var/log/nginx/access.log
  # - /var/log/nginx/error.log
  # - /var/log/apache2/access.log
  # - /var/log/apache2/error.log

# External script paths
scripts:
  update_containers: /opt/scripts/update-containers.sh
  backup: /opt/scripts/backup.sh

# Path to shared server states file (used by both bot and monitoring)
server_states_path: server_states.json

# Log directory for the application
log_directory: ./logs

# Monitoring configuration
monitoring:
  interval_minutes: 5

  # Monitored containers with failure policy.
  # on_failure options:
  #   notify_restart  - send alert AND auto-restart (default)
  #   notify          - send alert only, do not restart
  #   ignore          - do nothing
  # You can also use a plain string (e.g. "portainer") which defaults to notify_restart.
  containers:
    - name: portainer
      on_failure: notify_restart

  servers:
    - name: "My VPS"
      host: "1.2.3.4"
      port: 443

  # Monitored services with failure policy (same options as containers).
  # Policies can be changed at runtime via the Telegram bot menu.
  services:
    - name: nginx
      on_failure: notify_restart
    - name: docker
      on_failure: notify

  thresholds:
    cpu_percent: 80
    storage_percent: 90
    temperature_celsius: 50

  security:
    check_fail2ban: true
    check_ufw: true
    check_ssh_sessions: true
